server:
  port: 9193
spring:
    datasource:
      url: jdbc:postgresql://localhost:5432/employee_db
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update   # or create / create-drop
      show-sql: true
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:9194/eureka/
